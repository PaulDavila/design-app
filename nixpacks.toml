# Node: Vite 8 necesita ^20.19 o >=22.12. Solo [variables] a veces no aplica (p. ej. variable en Railway o engines ambiguos).
# nixPkgs en setup fuerza el runtime de Nix que Nixpacks instala (evita caer en nodejs_18 por defecto).
[variables]
NIXPACKS_NODE_VERSION = "23"
NPM_CONFIG_PRODUCTION = "false"

[phases.setup]
nixPkgs = ["nodejs_23", "npm-9_x"]
